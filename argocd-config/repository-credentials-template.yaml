# Repository Credentials Template
#
# Use credential templates to apply the same credentials
# to multiple repositories matching a URL pattern.

apiVersion: v1
kind: Secret
metadata:
  name: repo-creds-github
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repo-creds
    example: sync-strategies
stringData:
  # URL pattern - credentials apply to all repos matching this pattern
  url: https://github.com/jorge-romero
  
  # Credentials (same options as repository secrets)
  username: <github-username>
  password: <github-personal-access-token>
  
  # Or use SSH:
  # url: git@github.com:jorge-romero
  # sshPrivateKey: |
  #   -----BEGIN OPENSSH PRIVATE KEY-----
  #   ...
  #   -----END OPENSSH PRIVATE KEY-----
