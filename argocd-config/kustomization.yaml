apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Project definition (apply first)
  - project.yaml
  
  # Repository registration (choose one based on your setup)
  - repository-public.yaml
  # - repository-private-https.yaml
  # - repository-private-ssh.yaml
  # - repository-credentials-template.yaml
  
  # App of Apps (optional - manages all demo apps)
  # - app-of-apps.yaml

commonLabels:
  managed-by: argocd
  example: sync-strategies
